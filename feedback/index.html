<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback – Schalom Israel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../article.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">Schalom <strong>Israel</strong></a>
      <button class="nav-burger" aria-label="Menü öffnen">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/blog">Blog</a></li>
        <li><a href="/bibelverse" class="nav-cta">7 Verse</a></li>
      </ul>
    </div>
  </nav>

  <main class="simple-page">
    <div class="container container--narrow">
      <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; color: var(--gold); margin-bottom: 1rem;">Vielen Dank für dein Feedback.</p>
      <h1 class="simple-page-title">Das hilft uns sehr weiter.</h1>
      <p>Teile uns gerne mit, was genau dir gefallen oder nicht gefallen hat.</p>

      <form action="#" onsubmit="return false;" style="margin-top: 2rem;">
        <div style="margin-bottom: 1.5rem;">
          <textarea
            name="feedback"
            rows="6"
            placeholder="Dein Feedback..."
            style="width: 100%; padding: 0.875rem 1.25rem; border: 1px solid rgba(200,169,98,0.4); background: rgba(255,255,255,0.05); color: var(--cream); border-radius: 4px; font-size: 1rem; font-family: inherit; resize: vertical;"
          ></textarea>
        </div>
        <button type="submit" class="btn btn--primary">Feedback senden</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-logo">Schalom <strong>Israel</strong></p>
      <nav class="footer-nav">
        <a href="/kontakt">Kontakt</a>
        <span>·</span>
        <a href="/datenschutzerklaerung">Datenschutzerklärung</a>
        <span>·</span>
        <a href="/impressum">Impressum</a>
      </nav>
    </div>
  </footer>
  <script src="/main.js"></script>
</body>
</html>
